name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  installer-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Unix installer harness
        if: matrix.os == 'ubuntu-latest'
        run: sh scripts/install-test.sh

      - name: Run PowerShell installer harness
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/install-test.ps1

  release:
    needs:
      - installer-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser for v0.1.0
        if: github.ref_name == 'v0.1.0'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes .github/release-notes/v0.1.0.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser for v0.1.1+
        if: github.ref_name != 'v0.1.0'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
