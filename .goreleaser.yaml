version: 2

project_name: evmgo

builds:
  - id: evmgo
    main: ./cmd/evmgo
    binary: evmgo
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: evmgo
    ids:
      - evmgo
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  draft: true
  use_existing_draft: true
  mode: keep-existing

changelog:
  use: git
  abbrev: -1
  filters:
    include:
      - '^feat(\([^)]+\))?!?:.+$'
      - '^fix(\([^)]+\))?!?:.+$'
      - '^docs(\([^)]+\))?!?:.+$'
  groups:
    - title: Features
      regexp: '^.*?feat(\([^)]+\))?!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\([^)]+\))?!?:.+$'
      order: 1
    - title: Docs
      regexp: '^.*?docs(\([^)]+\))?!?:.+$'
      order: 2
